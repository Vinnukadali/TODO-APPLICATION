<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Body Center */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* Container */
.container{
    width:360px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

/* Heading */
.container h2{
    margin-bottom:20px;
}

/* Input Group */
.input-group{
    text-align:left;
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
    color:#444;
}

.input-group input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ddd;
    outline:none;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#667eea;
    box-shadow:0 0 5px rgba(102,126,234,0.4);
}

/* Button */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#5647c0;
}

/* Footer */
.footer-text{
    margin-top:15px;
    font-size:14px;
}

.footer-text a{
    color:#667eea;
    text-decoration:none;
    font-weight:bold;
}

.footer-text a:hover{
    text-decoration:underline;
}

/* Error */
.error-message{
    font-size:14px;
    margin-bottom:15px;
    padding:10px;
    background:#ffe6e6;
    border-radius:5px;
    color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>📝 Create Account</h2>

<form method="POST">
{% csrf_token %}

<div class="input-group">
<label>Full Name</label>
<input name="username" type="text" placeholder="Enter full name" required>
</div>

<div class="input-group">
<label>Email</label>
<input name="email" type="email" placeholder="Enter email" required>
</div>

<div class="input-group">
<label>Password</label>
<input name="password1" type="password" placeholder="Create password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input name="password2" type="password" placeholder="Confirm password" required>
</div>

<button class="btn" type="submit">Sign Up</button>

</form>

<div class="footer-text">
Already have account? <a href="{% url 'login' %}">Login</a>
</div>

</div>

</body>
</html>
